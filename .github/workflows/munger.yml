name: 芒格智慧推送

on:
  schedule:
    - cron: '0 1 * * *'
  workflow_dispatch:

jobs:
  push:
    runs-on: ubuntu-latest
    permissions:
      contents: write
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0
      
      - name: 设置Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.10'
      
      - name: 安装依赖
        run: pip install requests
      
      - name: 推送芒格智慧
        env:
          SENDKEY: ${{ secrets.SENDKEY }}
        run: python push_munger.py
      
      - name: 提交进度
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git add .push_state/
          git diff --cached --quiet || git commit -m "chore: 更新芒格推送进度" && git push
