name: 芒格智慧推送

on:
  schedule:
    - cron: '0 1 * * *'  # 每天早上9点（北京时间）
  workflow_dispatch:  # 支持手动触发

jobs:
  push:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      
      - name: 设置Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.10'
      
      - name: 安装依赖
        run: pip install requests
      
      - name: 推送消息
        env:
          SENDKEY: ${{ secrets.SENDKEY }}
        run: python push_munger.py
